name: Next application CI

on:
  pull_request:
    branches:
      - develop
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: next-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: 22

jobs:
  changes:
    name: Select validation scope
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run: ${{ steps.scope.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect next application changes
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" != pull_request ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run=false
          while IFS= read -r path; do
            case "$path" in
              next/*|scripts/*|deny.toml|.github/dependabot.yml|.github/workflows/next-ci.yml|.github/workflows/security.yml)
                run=true
                break
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "run=$run" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend and retained paths
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Install dependencies
        working-directory: next
        run: npm ci
      - name: Check frontend
        working-directory: next
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm test -- --run
          npm run build
      - name: Install Playwright Chromium
        working-directory: next
        run: npx playwright install --with-deps chromium
      - name: Check retained paths
        working-directory: next
        run: npm run test:e2e

  rust:
    name: Rust backend
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('next/src-tauri/Cargo.lock') }}
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - name: Prepare frontend distribution
        working-directory: next
        run: mkdir -p dist
      - name: Check Rust backend
        working-directory: next
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml --all-features

  streamlink-contract:
    name: Streamlink ${{ matrix.streamlink }} contract
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - streamlink: 8.0.0
          - streamlink: 8.4.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-contract-${{ runner.os }}-${{ hashFiles('next/src-tauri/Cargo.lock') }}
      - name: Install Streamlink ${{ matrix.streamlink }}
        shell: bash
        run: |
          python3 -m venv "$RUNNER_TEMP/streamlink"
          "$RUNNER_TEMP/streamlink/bin/python" -m pip install "streamlink==${{ matrix.streamlink }}"
          actual=$("$RUNNER_TEMP/streamlink/bin/streamlink" --version)
          [[ "$actual" == "streamlink ${{ matrix.streamlink }}" ]]
      - name: Run Streamlink ${{ matrix.streamlink }} installed executable contract
        env:
          STREAMLINK_EXECUTABLE: ${{ runner.temp }}/streamlink/bin/streamlink
          STREAMLINK_EXPECTED_VERSION: ${{ matrix.streamlink }}
        working-directory: next
        run: >-
          cargo test --manifest-path src-tauri/Cargo.toml --no-default-features --test streamlink_contract
          installed_executable_contract -- --ignored --exact

  bundle-smoke:
    name: Bundle smoke (${{ matrix.name }})
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            bundles: appimage,deb
          - name: Windows x64
            os: windows-2025
            bundles: nsis,msi
          - name: macOS x64
            os: macos-15-intel
            bundles: app,dmg
          - name: macOS arm64
            os: macos-15
            bundles: app,dmg
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: next/package-lock.json
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-bundle-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('next/src-tauri/Cargo.lock') }}
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - name: Install frontend dependencies
        working-directory: next
        run: npm ci
      - name: Build non-release bundle
        working-directory: next
        run: >-
          npm run tauri build -- --debug --bundles "${{ matrix.bundles }}"
          --config '{"bundle":{"createUpdaterArtifacts":false}}'

  gate:
    name: Next application CI
    if: always()
    needs:
      - changes
      - frontend
      - rust
      - streamlink-contract
      - bundle-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require successful selected jobs
        env:
          JOBS: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          jobs = json.loads(os.environ["JOBS"])
          failed = [name for name, job in jobs.items() if job["result"] in {"failure", "cancelled"}]
          if failed:
              raise SystemExit(f"required jobs did not pass: {', '.join(failed)}")
          PY
