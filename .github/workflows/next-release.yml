name: Draft next app release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: next-release-${{ github.sha }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: 22

jobs:
  version:
    name: Validate release source
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      target: ${{ steps.release.outputs.target }}
      previous_target: ${{ steps.release.outputs.previous_target }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Bind release to the triggering main commit
        id: release
        env:
          PREVIOUS_TARGET_SHA: ${{ github.event.before }}
        shell: bash
        run: |
          [[ "$GITHUB_EVENT_NAME" == push ]]
          [[ "$GITHUB_REF" == refs/heads/main ]]
          target=$(git rev-parse HEAD)
          [[ "$target" == "$GITHUB_SHA" ]]
          previous_target=$PREVIOUS_TARGET_SHA
          [[ "$target" =~ ^[0-9a-f]{40}$ ]]
          [[ "$previous_target" =~ ^[0-9a-f]{40}$ ]]
          [[ "$previous_target" != 0000000000000000000000000000000000000000 ]]
          [[ "$previous_target" != "$target" ]]
          git cat-file -e "$previous_target^{commit}"
          git cat-file -e "$target^{commit}"
          git merge-base --is-ancestor "$previous_target" "$target"
          version=$(python3 - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          from scripts.release_common import validate_version

          tauri = json.loads(Path("next/src-tauri/tauri.conf.json").read_text())["version"]
          package = json.loads(Path("next/package.json").read_text())["version"]
          cargo = tomllib.loads(Path("next/src-tauri/Cargo.toml").read_text())["package"]["version"]
          if len({tauri, package, cargo}) != 1:
              raise SystemExit("release versions in Tauri, npm, and Cargo manifests must match")
          print(validate_version(tauri))
          PY
          )
          tag="v$version"

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "target=$target"
            echo "previous_target=$previous_target"
          } >> "$GITHUB_OUTPUT"

  validate:
    name: Validate release source
    needs: version
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.target }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: next/package-lock.json
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-release-validation-${{ runner.os }}-${{ hashFiles('next/src-tauri/Cargo.lock') }}
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - name: Validate frontend and backend
        working-directory: next
        run: |
          npm ci
          npm audit --omit=dev --audit-level=low
          npm run format:check
          npm run lint
          npm run typecheck
          npm test -- --run
          npm run build
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml --all-features

  build:
    name: Build ${{ matrix.name }} release bundles
    needs:
      - version
      - validate
    environment: release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            platform: linux-x64
            bundles: appimage,deb
          - name: Windows x64
            os: windows-2025
            platform: windows-x64
            bundles: nsis,msi
          - name: macOS x64
            os: macos-15-intel
            platform: macos-x64
            bundles: dmg
          - name: macOS arm64
            os: macos-15
            platform: macos-arm64
            bundles: dmg
    env:
      RELEASE_PLATFORM: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.target }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: next/package-lock.json
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('next/src-tauri/Cargo.lock') }}
      - name: Require public Twitch client ID
        env:
          TWITCH_CLIENT_ID: ${{ vars.TWITCH_CLIENT_ID }}
        shell: bash
        run: |
          if ! [[ -n "${TWITCH_CLIENT_ID//[[:space:]]/}" ]]; then
            echo "Missing required release environment variable: TWITCH_CLIENT_ID" >&2
            exit 1
          fi
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - name: Install frontend dependencies
        working-directory: next
        run: npm ci
      - name: Create release configuration
        run: >-
          python3 scripts/create_release_config.py
          --version "${{ needs.version.outputs.version }}"
          --output next/src-tauri/tauri.release.conf.json
      - name: Build release bundles
        env:
          TWITCH_CLIENT_ID: ${{ vars.TWITCH_CLIENT_ID }}
        working-directory: next
        run: >-
          npm run tauri build -- --bundles "${{ matrix.bundles }}"
          --config "${{ github.workspace }}/next/src-tauri/tauri.release.conf.json"
      - name: Collect canonical release assets
        shell: bash
        run: >-
          python3 scripts/prepare_release_assets.py
          --bundle-dir next/src-tauri/target/release/bundle
          --output release-assets
          --platform "$RELEASE_PLATFORM"
          --version "${{ needs.version.outputs.version }}"
      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  draft:
    name: Verify and update trusted draft release
    needs:
      - version
      - build
    environment: release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.target }}
      - name: Download all release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Generate checksums and SBOM
        run: >-
          python3 scripts/release_metadata.py
          --directory release-assets
          --version "${{ needs.version.outputs.version }}"
          --target-sha "${{ needs.version.outputs.target }}"
          --package-lock next/package-lock.json
          --cargo-lock next/src-tauri/Cargo.lock
      - name: Verify complete release contract
        run: >-
          python3 scripts/verify_release_assets.py assets release-assets
          --version "${{ needs.version.outputs.version }}"
          --tag "${{ needs.version.outputs.tag }}"
          --repository "$GITHUB_REPOSITORY"
          --target-sha "${{ needs.version.outputs.target }}"
      - name: Update trusted draft release
        env:
          EXPECTED_RELEASE_ID: ${{ vars.EXPECTED_RELEASE_ID }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
          TARGET_SHA: ${{ needs.version.outputs.target }}
          PREVIOUS_TARGET_SHA: ${{ needs.version.outputs.previous_target }}
        shell: bash
        run: |
          if ! [[ "$EXPECTED_RELEASE_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "EXPECTED_RELEASE_ID must be a positive ASCII decimal database ID" >&2
            exit 1
          fi
          if [[ "$EXPECTED_RELEASE_ID" != 353669835 ]]; then
            echo "EXPECTED_RELEASE_ID must identify preserved Draft Release 353669835" >&2
            exit 1
          fi

          release_title="UNSIGNED COMMUNITY BUILD - Streamlink Twitch GUI $RELEASE_VERSION"
          release_notes=$(cat <<'EOF'
          # UNSIGNED COMMUNITY BUILD

          No platform publisher trust: Windows installers are unsigned and may show Windows SmartScreen and unknown publisher warnings.
          macOS DMGs are not notarized by Apple; macOS Gatekeeper may block downloads carrying quarantine.
          No automatic updater metadata is included; install this release manually.
          Manual install testing is required on every target platform before publication.
          Review SHA256SUMS and the CycloneDX SBOM as integrity evidence only, not as proof of publisher identity.
          EOF
          )
          release_id_output=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq '.[] | select(.tag_name == env.RELEASE_TAG) | (.id // "invalid")')
          release_ids=()
          if [[ -n "$release_id_output" ]]; then
            mapfile -t release_ids <<< "$release_id_output"
          fi
          if [[ ${#release_ids[@]} -gt 1 ]]; then
            echo "Refusing to choose between duplicate releases for $RELEASE_TAG" >&2
            exit 1
          fi
          if [[ ${#release_ids[@]} -ne 1 ]]; then
            echo "Expected preserved Draft Release $EXPECTED_RELEASE_ID for $RELEASE_TAG" >&2
            exit 1
          fi

          release_id=${release_ids[0]}
          if [[ "$release_id" != "$EXPECTED_RELEASE_ID" ]]; then
            echo "Tag-matching release ID $release_id does not match expected ID $EXPECTED_RELEASE_ID" >&2
            exit 1
          fi
          python3 scripts/verify_release_tag.py --repository "$GITHUB_REPOSITORY" --tag "$RELEASE_TAG" --target-sha "$TARGET_SHA" --require-draft-release --release-id "$release_id" --previous-target-sha "$PREVIOUS_TARGET_SHA"
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" -f tag_name="$RELEASE_TAG" -f target_commitish="$TARGET_SHA" -f name="$release_title" -f body="$release_notes" -F draft=true >/dev/null
          asset_ids=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100" --jq '.[].id')
          while IFS= read -r asset_id; do
            if [[ -n "$asset_id" ]]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
            fi
          done <<< "$asset_ids"
          for asset_path in release-assets/*; do
            asset_name=${asset_path##*/}
            gh api --method POST "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$release_id/assets?name=$asset_name" -H "Content-Type: application/octet-stream" --input "$asset_path" >/dev/null
          done
          [[ $(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" --jq .draft) == true ]]
          [[ $(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" --jq .target_commitish) == "$TARGET_SHA" ]]
