name: Draft next app release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: next-release-${{ github.sha }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: 22

jobs:
  version:
    name: Validate release source
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      target: ${{ steps.release.outputs.target }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Bind release to the triggering main commit
        id: release
        shell: bash
        run: |
          [[ "$GITHUB_EVENT_NAME" == push ]]
          [[ "$GITHUB_REF" == refs/heads/main ]]
          target=$(git rev-parse HEAD)
          [[ "$target" == "$GITHUB_SHA" ]]
          version=$(python3 - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          from scripts.release_common import validate_version

          tauri = json.loads(Path("next/src-tauri/tauri.conf.json").read_text())["version"]
          package = json.loads(Path("next/package.json").read_text())["version"]
          cargo = tomllib.loads(Path("next/src-tauri/Cargo.toml").read_text())["package"]["version"]
          if len({tauri, package, cargo}) != 1:
              raise SystemExit("release versions in Tauri, npm, and Cargo manifests must match")
          print(validate_version(tauri))
          PY
          )
          tag="v$version"

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "target=$target"
          } >> "$GITHUB_OUTPUT"

  validate:
    name: Validate release source
    needs: version
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.target }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: next/package-lock.json
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-release-validation-${{ runner.os }}-${{ hashFiles('next/src-tauri/Cargo.lock') }}
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - name: Validate frontend and backend
        working-directory: next
        run: |
          npm ci
          npm audit --omit=dev --audit-level=low
          npm run format:check
          npm run lint
          npm run typecheck
          npm test -- --run
          npm run build
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml --all-features

  build:
    name: Build ${{ matrix.name }} release bundles
    needs:
      - version
      - validate
    environment: release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            platform: linux-x64
            bundles: appimage,deb
          - name: Windows x64
            os: windows-2025
            platform: windows-x64
            bundles: nsis,msi
          - name: macOS x64
            os: macos-15-intel
            platform: macos-x64
            bundles: dmg
          - name: macOS arm64
            os: macos-15
            platform: macos-arm64
            bundles: dmg
    env:
      RELEASE_PLATFORM: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.target }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: next/package-lock.json
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('next/src-tauri/Cargo.lock') }}
      - name: Require public Twitch client ID
        env:
          TWITCH_CLIENT_ID: ${{ vars.TWITCH_CLIENT_ID }}
        shell: bash
        run: |
          if ! [[ -n "${TWITCH_CLIENT_ID//[[:space:]]/}" ]]; then
            echo "Missing required release environment variable: TWITCH_CLIENT_ID" >&2
            exit 1
          fi
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - name: Install frontend dependencies
        working-directory: next
        run: npm ci
      - name: Create release configuration
        run: >-
          python3 scripts/create_release_config.py
          --version "${{ needs.version.outputs.version }}"
          --output next/src-tauri/tauri.release.conf.json
      - name: Build release bundles
        env:
          TWITCH_CLIENT_ID: ${{ vars.TWITCH_CLIENT_ID }}
        working-directory: next
        run: >-
          npm run tauri build -- --bundles "${{ matrix.bundles }}"
          --config "${{ github.workspace }}/next/src-tauri/tauri.release.conf.json"
      - name: Collect canonical release assets
        shell: bash
        run: >-
          python3 scripts/prepare_release_assets.py
          --bundle-dir next/src-tauri/target/release/bundle
          --output release-assets
          --platform "$RELEASE_PLATFORM"
          --version "${{ needs.version.outputs.version }}"
      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  draft:
    name: Verify and create draft release
    needs:
      - version
      - build
    environment: release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.target }}
      - name: Download all release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Generate checksums and SBOM
        run: >-
          python3 scripts/release_metadata.py
          --directory release-assets
          --version "${{ needs.version.outputs.version }}"
          --target-sha "${{ needs.version.outputs.target }}"
          --package-lock next/package-lock.json
          --cargo-lock next/src-tauri/Cargo.lock
      - name: Verify complete release contract
        run: >-
          python3 scripts/verify_release_assets.py assets release-assets
          --version "${{ needs.version.outputs.version }}"
          --tag "${{ needs.version.outputs.tag }}"
          --repository "$GITHUB_REPOSITORY"
          --target-sha "${{ needs.version.outputs.target }}"
      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
          TARGET_SHA: ${{ needs.version.outputs.target }}
        shell: bash
        run: |
          release_title="UNSIGNED COMMUNITY BUILD - Streamlink Twitch GUI $RELEASE_VERSION"
          release_notes=$(cat <<'EOF'
          # UNSIGNED COMMUNITY BUILD

          No platform publisher trust: Windows installers are unsigned and may show Windows SmartScreen and unknown publisher warnings.
          macOS DMGs are not notarized by Apple; macOS Gatekeeper may block downloads carrying quarantine.
          No automatic updater metadata is included; install this release manually.
          Manual install testing is required on every target platform before publication.
          Review SHA256SUMS and the CycloneDX SBOM as integrity evidence only, not as proof of publisher identity.
          EOF
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            draft=$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)
            if [[ "$draft" != true ]]; then
              echo "Refusing to modify published release $RELEASE_TAG" >&2
              exit 1
            fi
            existing_target=$(gh release view "$RELEASE_TAG" --json targetCommitish --jq .targetCommitish)
            if [[ "$existing_target" != "$TARGET_SHA" ]]; then
              echo "Refusing to retarget draft $RELEASE_TAG from $existing_target" >&2
              exit 1
            fi
            python3 scripts/verify_release_tag.py --repository "$GITHUB_REPOSITORY" --tag "$RELEASE_TAG" --target-sha "$TARGET_SHA" --require-draft-release
            gh release edit "$RELEASE_TAG" --draft --target "$TARGET_SHA" --title "$release_title" --notes "$release_notes"
            release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq .id)
            asset_ids=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100" --jq '.[].id')
            while IFS= read -r asset_id; do
              if [[ -n "$asset_id" ]]; then
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
              fi
            done <<< "$asset_ids"
          else
            python3 scripts/verify_release_tag.py --repository "$GITHUB_REPOSITORY" --tag "$RELEASE_TAG" --target-sha "$TARGET_SHA" --allow-missing
            gh release create "$RELEASE_TAG" --draft --target "$TARGET_SHA" --title "$release_title" --notes "$release_notes"
            python3 scripts/verify_release_tag.py --repository "$GITHUB_REPOSITORY" --tag "$RELEASE_TAG" --target-sha "$TARGET_SHA" --require-draft-release
          fi
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
          [[ $(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft) == true ]]
          [[ $(gh release view "$RELEASE_TAG" --json targetCommitish --jq .targetCommitish) == "$TARGET_SHA" ]]
