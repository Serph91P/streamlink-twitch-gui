name: Release next app

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: next-continuous-release
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: 22

jobs:
  version:
    name: Determine version
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      title: ${{ steps.version.outputs.title }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Calculate next patch version
        id: version
        shell: bash
        run: |
          version=$(scripts/next-release-version.sh)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "title=Streamlink Twitch GUI $version release" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            bundles: deb
            asset-path: next/src-tauri/target/release/bundle/deb/*.deb
            artifact: next-linux-x64
          - name: Windows x64
            os: windows-2025
            bundles: nsis
            asset-path: next/src-tauri/target/release/bundle/nsis/*.exe
            artifact: next-windows-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - name: Install frontend dependencies
        working-directory: next
        run: npm ci
      - name: Build unsigned bundle
        working-directory: next
        shell: bash
        run: >-
          npm run tauri build -- --bundles "${{ matrix.bundles }}"
          --config '{"version":"${{ needs.version.outputs.version }}"}'
      - name: Upload unsigned bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset-path }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish ${{ needs.version.outputs.tag }}
    needs:
      - version
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download Linux bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-linux-x64
          path: release-assets/linux
      - name: Download Windows bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: next-windows-x64
          path: release-assets/windows
      - name: Verify and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
          RELEASE_TITLE: ${{ needs.version.outputs.title }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          shopt -s nullglob
          linux_assets=(release-assets/linux/*.deb)
          windows_assets=(release-assets/windows/*.exe)
          if (( ${#linux_assets[@]} != 1 || ${#windows_assets[@]} != 1 )); then
            echo "Expected exactly one Linux package and one Windows installer" >&2
            exit 1
          fi

          release_args=(
            "$RELEASE_TAG"
            "${linux_assets[@]}"
            "${windows_assets[@]}"
            --target "$TARGET_SHA"
            --title "$RELEASE_TITLE"
            --notes "Automated build from \`$GITHUB_REF_NAME\`. Linux and Windows artifacts are unsigned."
            --draft
          )
          gh release create "${release_args[@]}"
          gh release edit "$RELEASE_TAG" --draft=false
