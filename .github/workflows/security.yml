name: Security and supply chain

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
  schedule:
    - cron: "43 3 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm production audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next/package-lock.json
      - name: Install locked dependencies
        working-directory: next
        run: npm ci
      - name: Audit production dependencies
        working-directory: next
        run: npm audit --omit=dev --audit-level=low

  rust-security:
    name: Rust advisories and policy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-security-${{ runner.os }}-${{ hashFiles('next/src-tauri/Cargo.lock') }}
      - name: Install pinned security tools
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo install cargo-deny --version 0.20.2 --locked
      - name: Check Rust advisories
        run: cargo audit --file next/src-tauri/Cargo.lock
      - name: Check Rust licenses and sources
        run: cargo deny --manifest-path next/src-tauri/Cargo.toml check

  secrets:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan repository history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  workflow-pins:
    name: Immutable action pins
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify release automation contracts
        run: python3 -m unittest discover -s scripts/tests -v
      - name: Reject unpinned actions
        run: python3 scripts/verify_workflows.py
